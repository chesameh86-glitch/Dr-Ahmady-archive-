<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أرشيف د. أحمدى</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .screen { display: none; }
        .screen.active { display: block; }
        body { background: #f2f5fb; font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="loginScreen" class="screen active min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center">
            <h1 class="text-2xl font-bold text-blue-900 mb-6">أرشيف د. أحمدى</h1>
            <input type="password" id="pin" placeholder="أدخل الرقم السري" class="w-full p-3 mb-4 border rounded-lg text-center outline-none">
            <button id="loginBtn" class="w-full bg-blue-900 text-white p-3 rounded-lg hover:bg-blue-800">دخول</button>
        </div>
    </div>

    <div id="appScreen" class="screen min-h-screen p-4">
        <header class="bg-blue-900 text-white p-4 rounded-lg shadow-lg flex justify-between items-center">
            <h2 class="font-bold">نظام الأرشيف الطبي</h2>
            <button id="logoutBtn" class="bg-red-500 px-4 py-2 rounded-lg text-sm">خروج</button>
        </header>
        <main class="mt-6 text-center">
            <h2 class="text-xl font-bold">مرحباً د. أحمدى</h2>
            <p>تم تفعيل الأرشيف بنجاح.</p>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyC8eJQUgn0wHVM9BND45FgzGuPpZLN55fo",
            authDomain: "duplex-archive.firebaseapp.com",
            projectId: "duplex-archive",
            storageBucket: "duplex-archive.appspot.com",
            messagingSenderId: "545107391490",
            appId: "1:545107391490:web:9af5bc4d8deb22e575a31b",
            measurementId: "G-TX3TLPFWGZ"
        };
        initializeApp(firebaseConfig);

        document.getElementById('loginBtn').onclick = () => {
            if(document.getElementById('pin').value === "1234") {
                document.getElementById('loginScreen').classList.remove('active');
                document.getElementById('appScreen').classList.add('active');
            } else { alert("خطأ في كلمة المرور"); }
        };
        document.getElementById('logoutBtn').onclick = () => location.reload();
    </script>
</body>
</html>
